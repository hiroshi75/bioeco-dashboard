<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioEco Agent Lab — Research Portal</title>
<style>
:root { --bg: #0a0f1a; --card: #111827; --border: #1e293b; --accent: #10b981; --accent2: #3b82f6; --text: #e2e8f0; --dim: #94a3b8; --red: #ef4444; --yellow: #f59e0b; --good: #10b981; --bad: #ef4444; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
header { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); padding: 40px 0; border-bottom: 1px solid var(--accent); }
header h1 { font-size: 2rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header p { color: var(--dim); margin-top: 8px; font-size: 0.95rem; }
.stats-bar { display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
.stat { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 8px; padding: 12px 20px; }
.stat .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
.stat .label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
nav .container { display: flex; gap: 16px; overflow-x: auto; }
nav a { color: var(--dim); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; white-space: nowrap; transition: all 0.2s; }
nav a:hover, nav a.active { color: var(--accent); background: rgba(16,185,129,0.1); }
section { padding: 40px 0; border-bottom: 1px solid var(--border); }
section h2 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
section h2 .badge { font-size: 0.7rem; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; transition: border-color 0.2s; }
.card:hover { border-color: var(--accent); }
.card h3 { font-size: 1rem; margin-bottom: 8px; }
.card .meta { font-size: 0.8rem; color: var(--dim); margin-bottom: 12px; }
.card .meta span { margin-right: 12px; }
.card p { font-size: 0.85rem; color: var(--dim); }
.card .tag { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin-right: 4px; margin-top: 8px; }
.tag-good { background: rgba(16,185,129,0.15); color: var(--good); border: 1px solid rgba(16,185,129,0.3); }
.tag-bad { background: rgba(239,68,68,0.15); color: var(--bad); border: 1px solid rgba(239,68,68,0.3); }
.tag-pending { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
.tag-paper { background: rgba(59,130,246,0.15); color: var(--accent2); border: 1px solid rgba(59,130,246,0.3); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { text-align: left; padding: 10px 12px; background: rgba(16,185,129,0.05); border-bottom: 2px solid var(--border); color: var(--accent); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(255,255,255,0.02); }
.timeline { position: relative; padding-left: 30px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 24px; }
.timeline-item::before { content: ''; position: absolute; left: -24px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.timeline-item .time { font-size: 0.75rem; color: var(--dim); }
.timeline-item .content { margin-top: 4px; }
.channel-feed { max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.8rem; }
.channel-feed .msg { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.channel-feed .from { color: var(--accent); font-weight: 600; }
.channel-feed .ts { color: var(--dim); font-size: 0.7rem; }
.quality-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.quality-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.quality-card .num { font-size: 2rem; font-weight: 700; }
.quality-card .label { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }
#team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.agent-card .name { font-weight: 700; color: var(--accent); }
.agent-card .role { font-size: 0.8rem; color: var(--dim); margin-top: 4px; }
.agent-card .status { font-size: 0.7rem; margin-top: 8px; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-active { background: var(--good); }
footer { padding: 40px 0; text-align: center; color: var(--dim); font-size: 0.8rem; }
@media (max-width: 768px) { .stats-bar { flex-direction: column; } .grid { grid-template-columns: 1fr; } }
</style>
</head>

        <span class="tag" style="background:rgba(255,255,255,0.05);border:1px solid ${wColor}">論文価値: <b style="color:${wColor}">${p.worth || 'TBD'}</b></span>
      </div>
      <span class="tag tag-${p.tag}" style="margin-top:8px">${p.status}</span>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        ${p.draft ? `<a href="${p.draft}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.75rem;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);padding:3px 10px;border-radius:4px;text-decoration:none;font-weight:600">📄 EN</a>` : ''}
        ${p.draftJa ? `<a href="${p.draftJa}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.75rem;color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);padding:3px 10px;border-radius:4px;text-decoration:none;font-weight:600">📄 日本語</a>` : ''}
        ${p.slug ? `<a href="study.html?s=${p.slug}" style="font-size:0.75rem;color:var(--accent);text-decoration:none">→ 詳細を見る</a>` : ''}
      </div>
    </div>`}).join('');
}

let currentFilter = 'all';
let currentSort = 'priority';

function filterPapers(tag) {
  currentFilter = tag;
  document.querySelectorAll('#paper-filters button').forEach(b => {
    b.style.background = 'rgba(255,255,255,0.05)';
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--dim)';
  });
  const btns = document.querySelectorAll('#paper-filters button');
  const idx = tag === 'all' ? 0 : tag === 'paper' ? 1 : 2;
  if (btns[idx]) { btns[idx].style.background = 'rgba(16,185,129,0.2)'; btns[idx].style.borderColor = 'var(--accent)'; btns[idx].style.color = 'var(--accent)'; }
  renderPapers();
}

function sortPapers(by) {
  currentSort = by;
  renderPapers();
}

function getFilteredPapers() {
  let p = currentFilter === 'all' ? PAPERS : PAPERS.filter(x => x.tag === currentFilter);
  if (currentSort === 'novelty') p = [...p].sort((a,b) => (b.novelty||'').localeCompare(a.novelty||''));
  else if (currentSort === 'title') p = [...p].sort((a,b) => a.title.localeCompare(b.title));
  return p;
}
