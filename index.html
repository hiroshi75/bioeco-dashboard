<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioEco Agent Lab — Research Portal</title>
<style>
:root { --bg: #0a0f1a; --card: #111827; --border: #1e293b; --accent: #10b981; --accent2: #3b82f6; --text: #e2e8f0; --dim: #94a3b8; --red: #ef4444; --yellow: #f59e0b; --good: #10b981; --bad: #ef4444; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
header { background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); padding: 40px 0; border-bottom: 1px solid var(--accent); }
header h1 { font-size: 2rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header p { color: var(--dim); margin-top: 8px; font-size: 0.95rem; }
.stats-bar { display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
.stat { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 8px; padding: 12px 20px; }
.stat .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
.stat .label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
nav .container { display: flex; gap: 16px; overflow-x: auto; }
nav a { color: var(--dim); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; white-space: nowrap; transition: all 0.2s; }
nav a:hover, nav a.active { color: var(--accent); background: rgba(16,185,129,0.1); }
section { padding: 40px 0; border-bottom: 1px solid var(--border); }
section h2 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
section h2 .badge { font-size: 0.7rem; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; transition: border-color 0.2s; }
.card:hover { border-color: var(--accent); }
.card h3 { font-size: 1rem; margin-bottom: 8px; }
.card .meta { font-size: 0.8rem; color: var(--dim); margin-bottom: 12px; }
.card .meta span { margin-right: 12px; }
.card p { font-size: 0.85rem; color: var(--dim); }
.card .tag { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin-right: 4px; margin-top: 8px; }
.tag-good { background: rgba(16,185,129,0.15); color: var(--good); border: 1px solid rgba(16,185,129,0.3); }
.tag-bad { background: rgba(239,68,68,0.15); color: var(--bad); border: 1px solid rgba(239,68,68,0.3); }
.tag-pending { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
.tag-paper { background: rgba(59,130,246,0.15); color: var(--accent2); border: 1px solid rgba(59,130,246,0.3); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { text-align: left; padding: 10px 12px; background: rgba(16,185,129,0.05); border-bottom: 2px solid var(--border); color: var(--accent); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(255,255,255,0.02); }
.timeline { position: relative; padding-left: 30px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 24px; }
.timeline-item::before { content: ''; position: absolute; left: -24px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.timeline-item .time { font-size: 0.75rem; color: var(--dim); }
.timeline-item .content { margin-top: 4px; }
.channel-feed { max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.8rem; }
.channel-feed .msg { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.channel-feed .from { color: var(--accent); font-weight: 600; }
.channel-feed .ts { color: var(--dim); font-size: 0.7rem; }
.quality-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.quality-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.quality-card .num { font-size: 2rem; font-weight: 700; }
.quality-card .label { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }
#team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.agent-card .name { font-weight: 700; color: var(--accent); }
.agent-card .role { font-size: 0.8rem; color: var(--dim); margin-top: 4px; }
.agent-card .status { font-size: 0.7rem; margin-top: 8px; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-active { background: var(--good); }
footer { padding: 40px 0; text-align: center; color: var(--dim); font-size: 0.8rem; }
@media (max-width: 768px) { .stats-bar { flex-direction: column; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
<div class="container">
  <h1><span>BioEco</span> Agent Lab</h1>
  <p>マルチAIエージェント技術による自律型生態学研究基盤 — Research Portal</p>
  <div class="stats-bar" id="header-stats"></div>
</div>
</header>

<nav>
<div class="container">
  <a href="#papers" class="active">Papers</a>
  <a href="#quality">Quality Control</a>
  <a href="#team">Team</a>
</div>
</nav>

<div class="container">

<section id="papers">
  <h2>Papers <span class="badge" id="paper-count"></span></h2>
  <div class="grid" id="papers-grid"></div>
</section>

<section id="quality">
  <h2>Quality Control Scorecard</h2>
  <div class="quality-grid" id="quality-grid"></div>
</section>

<section id="team">
  <h2>Team <span class="badge" id="team-count"></span></h2>
  <div id="team-grid"></div>
</section>


</div>

<footer>
<p>BioEco Agent Lab — Powered by AgentLattice | 13 Agents | Auto-refreshes every 15s</p>
</footer>

<script>
const PAPERS = [
  { title: "RDD × Protected Area Boundaries + CTI Climate Debt", target: "Nature Sustainability", status: "🔬 研究中 — 距離検証完了+RDD×CTI統合GO", slug: "rdd-protected-areas", type: "Article", key: "RDD×鳥類種数+CTI気候負債=3重の世界初。距離計算検証完了(Ken版正確)。カテゴリ別RDD+保護区気候緩衝のdual-outcome paper", tag: "paper", novelty: "A", progress: "B+", worth: "最有望", priority: 1, draft: null },
  { title: "Ghost Signals in Phenological Records", target: "Ecology Letters", status: "✅ Gate C PASS — 投稿GO", slug: "paper5-ghost-signals", type: "Article", key: "+3.2 days/decade (GLS-AR1), 6仮説排除, ghost signal概念。OLS→GLS修正+Ellwood差別化+追試完了", tag: "paper", novelty: "B+", progress: "B+", worth: "YES", priority: 2, draft: "files/20260317120000-paper5-ghost-signals/manuscript/paper5-ghost-signals-manuscript.pdf", draftJa: "files/20260317120000-paper5-ghost-signals/manuscript/paper5-ghost-signals-manuscript-ja.pdf", ga: "img/paper5-graphical-abstract.png" },
  { title: "Apparent Stability: Species Richness Masks Biotic Homogenization", target: "Ecology Letters", status: "✅ Gate C PASS — 投稿GO", slug: "paper1-apparent-stability", type: "Article", key: "種数安定×CTI安定×25% turnover=三重の保全盲点。追試で核心結果完全再現", tag: "paper", novelty: "B", progress: "B+", worth: "YES", priority: 3, draft: "files/20260317120100-paper1-apparent-stability/manuscript/paper1-apparent-stability-manuscript.pdf", draftJa: "files/20260317120100-paper1-apparent-stability/manuscript/paper1-apparent-stability-manuscript-ja.pdf", ga: "img/paper1-graphical-abstract.png" },
  { title: "STI Quality Framework for CTI Analysis", target: "MEE", status: "📝 ドラフト完成 — Kaiレビュー待ち", slug: "sti-methods-note", type: "Application Note", key: "STI 5世代で4回artifact検出。マッチ率閾値(<50%禁止/>80%安定)を実証的に確立", tag: "pending", novelty: "B", progress: "B+", worth: "YES", priority: 4, draft: "files/20260317120300-sti-methods-note/manuscript/sti-methods-note-manuscript.pdf", draftJa: "files/20260317120300-sti-methods-note/manuscript/sti-methods-note-manuscript-ja.pdf" },
  { title: "eBird Global Ghost Signals", target: "GEB / GCB", status: "🔬 研究中 — テーマGO、データ申請準備中", slug: "", type: "Article", key: "Paper 5のグローバル展開。eBird 16億記録で全球鳥類Ghost Signal検証。C1v3完了、先行研究なし(外部確認)", tag: "pending", novelty: "B", progress: "初期", worth: "YES", priority: "新", draft: null },
  { title: "Bear-Human Conflict Prediction + Masting Intensification", target: "J Applied Ecology", status: "🔬 研究中 — テーマ9統合(CV記述+null鳥類カスケード)", slug: "hmast1-phase1-cascade", type: "Article", key: "AR(1)+日照でLOOCV±1=78%。堅果CV増加(0.55→0.92)。堅果→鳥類カスケードはnull(6テスト)→クマのみ確認", tag: "pending", novelty: "B-", progress: "B", worth: "条件付き", priority: 6, draft: null },
  { title: "Seasonal Divergence: Climate Amplifies Temporal β-diversity", target: "Science / Science Advances", status: "🔬 パイロット有望 — rarefied p=0.005。12研究pooled待ち", slug: "", type: "Article", key: "BioTIME鳥類で季節β増加(deepening)を発見。erosion予想の逆。先行研究ゼロ。空間均質化(Paper1)×時間分化の二重パターン", tag: "pending", novelty: "★★★★★", progress: "B-", worth: "最有望", priority: "新", draft: null },
  { title: "Global RDD × Biodiversity (30×30検証)", target: "Nature Sustainability", status: "🔬 研究中 — 日本パイロット→全球拡張を計画", slug: "", type: "Article", key: "WDPA 24万保護区×GBIF全球鳥類。Neal 2024(森林)→鳥類種数へのRDD初適用。30×30目標の政策検証", tag: "pending", novelty: "A", progress: "構想", worth: "最有望", priority: "新", draft: null },
  { title: "Sanriku MHW 2022–2024", target: "GRL (保留中)", status: "⏸️ 再保留 — 外部レビューでSugimoto/Qiao差別化不足指摘。SSH独立検証が必要", slug: "grl-note-mhw-sanriku", type: "Research Letter", key: "Hobday 85% EXTREME、β_PDO=-0.76(anomaly)。外部: 新規性中程度。SSH-KE相関+Qiao比較+タイトルトーンダウンが必要", tag: "pending", novelty: "C+", progress: "B", worth: "条件付き", priority: 5, draft: "files/20260317120200-grl-note-mhw-sanriku/manuscript/grl-note-mhw-sanriku-manuscript.pdf", draftJa: "files/20260317120200-grl-note-mhw-sanriku/manuscript/grl-note-mhw-sanriku-manuscript-ja.pdf" }
];

const QUALITY = [
  { num: "4", label: "STI Artifacts Detected", color: "var(--good)" },
  { num: "1", label: "OLS/GLS Mismatch (replication)", color: "var(--yellow)" },
  { num: "1", label: "Rarefaction Artifact (RDD)", color: "var(--good)" },
  { num: "3", label: "Prior Studies Missed", color: "var(--yellow)" },
  { num: "1", label: "BH Multiple Testing", color: "var(--good)" },
  { num: "5", label: "Optimism Bias Corrections", color: "var(--good)" },
  { num: "3", label: "Hypotheses Honestly Rejected", color: "var(--accent2)" },
  { num: "1", label: "RDD Distance Polygon Artifact", color: "var(--good)" },
  { num: "6", label: "QC Systems (C1v3+F5+replication)", color: "var(--good)" },
  { num: "8+", label: "Internal Peer Reviews", color: "var(--accent2)" },
  { num: "8", label: "Experiment Logs (Ken 4 + Kai 4)", color: "var(--accent2)" },
  { num: "211", label: "Bird STI Species (99.5% coverage)", color: "var(--good)" }
];

function renderPapers() {
  document.getElementById('paper-count').textContent = PAPERS.length + ' papers';
  document.getElementById('papers-grid').innerHTML = PAPERS.map(p => {
    const nColor = p.novelty?.startsWith('A') ? 'var(--accent)' : p.novelty?.startsWith('B+') ? '#22d3ee' : p.novelty?.startsWith('B') ? 'var(--accent2)' : 'var(--dim)';
    const wColor = p.worth === 'YES' ? 'var(--accent)' : p.worth === '最有望' ? '#f59e0b' : 'var(--dim)';
    return `
    <div class="card" style="cursor:pointer;border-left:3px solid ${nColor}" onclick="${p.slug ? "location.href='study.html?s="+p.slug+"'" : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="flex:1">${p.title}</h3>
        <span style="font-size:0.7rem;background:rgba(0,0,0,0.3);padding:2px 8px;border-radius:4px;color:var(--dim)">★${p.priority}</span>
      </div>
      <div class="meta"><span>想定投稿先：${p.target} ${p.type}</span></div>
      ${p.ga ? `<img src="${p.ga}" alt="Graphical Abstract" style="width:100%;max-height:180px;object-fit:contain;border-radius:6px;margin:8px 0;background:rgba(255,255,255,0.03);border:1px solid var(--border)">` : ''}
      <p style="font-size:0.85rem;margin:8px 0">${p.key}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
        <span class="tag" style="background:rgba(255,255,255,0.05);border:1px solid ${nColor}">新規性: <b style="color:${nColor}">${p.novelty || 'TBD'}</b></span>
        <span class="tag" style="background:rgba(255,255,255,0.05);border:1px solid var(--border)">進歩性: <b>${p.progress || 'TBD'}</b></span>
        <span class="tag" style="background:rgba(255,255,255,0.05);border:1px solid ${wColor}">論文価値: <b style="color:${wColor}">${p.worth || 'TBD'}</b></span>
      </div>
      <span class="tag tag-${p.tag}" style="margin-top:8px">${p.status}</span>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        ${p.draft ? `<a href="${p.draft}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.75rem;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);padding:3px 10px;border-radius:4px;text-decoration:none;font-weight:600">📄 EN</a>` : ''}
        ${p.draftJa ? `<a href="${p.draftJa}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.75rem;color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);padding:3px 10px;border-radius:4px;text-decoration:none;font-weight:600">📄 日本語</a>` : ''}
        ${p.slug ? `<a href="study.html?s=${p.slug}" style="font-size:0.75rem;color:var(--accent);text-decoration:none">→ 詳細を見る</a>` : ''}
      </div>
    </div>`}).join('');
}

function renderQuality() {
  document.getElementById('quality-grid').innerHTML = QUALITY.map(q => `
    <div class="quality-card">
      <div class="num" style="color:${q.color}">${q.num}</div>
      <div class="label">${q.label}</div>
    </div>`).join('');
}

function loadTeam() {
  const agents = [
    { display_name: "Jim Leader", name: "jim-leader", description: "統括リーダー。研究パイプラインのオーケストレーション", status: "active" },
    { display_name: "Ryo", name: "ryo-ecologist", description: "主席エコロジスト。研究テーマの設計・提案", status: "active" },
    { display_name: "Ken", name: "ken-analyst", description: "統計分析スペシャリスト。仮説検証・モデリング", status: "active" },
    { display_name: "Sora", name: "sora-data", description: "データ収集スペシャリスト。GBIF/eBird/JMAデータ取得", status: "active" },
    { display_name: "Mika", name: "mika-literature", description: "文献調査スペシャリスト。C1v3先行研究検索", status: "active" },
    { display_name: "Yui", name: "yui-validator", description: "品質保証スペシャリスト。ゲートA/B/C運用", status: "active" },
    { display_name: "Hana", name: "hana-presenter", description: "サイエンスコミュニケーション。スライド・図表作成", status: "active" },
    { display_name: "Mei", name: "mei-climate-lead", description: "気候変動研究チームリーダー", status: "active" },
    { display_name: "Kai", name: "kai-climate-data", description: "気候データエンジニア。ERA5/OISST/WorldClim", status: "active" },
    { display_name: "Rin", name: "rin-climate-model", description: "気候-生態モデラー。SEM/ベイズ/因果推論", status: "active" },
    { display_name: "Rev-A", name: "rev-a-ecology", description: "独立査読者（生態学・保全生物学）", status: "active" },
    { display_name: "Rev-B", name: "rev-b-ocean", description: "独立査読者（物理海洋学・気候科学）", status: "active" },
    { display_name: "Rev-C", name: "rev-c-stats", description: "独立査読者（生物統計学・方法論）", status: "active" },
  ];
  document.getElementById('team-count').textContent = agents.length + ' agents';
  document.getElementById('team-grid').innerHTML = agents.map(a => `
      <div class="agent-card">
        <div class="name">${a.display_name} <span style="color:var(--dim);font-weight:400;font-size:0.8rem">(${a.name})</span></div>
        <div class="role">${a.description.substring(0, 80)}...</div>
        <div class="status"><span class="status-dot status-${a.status}"></span>${a.status}</div>
      </div>`).join('');
}

function renderHeaderStats() {
  const stats = [
    { num: '8', label: 'Research Themes' },
    { num: '10', label: 'Confirmed Results' },
    { num: '13', label: 'AI Agents (+ 3 Reviewers)' },
    { num: '6', label: 'QC Systems' }
  ];
  document.getElementById('header-stats').innerHTML = stats.map(s =>
    `<div class="stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`
  ).join('');
}

renderHeaderStats();
renderPapers();
renderQuality();
loadTeam();
</script>
</body>
</html>
