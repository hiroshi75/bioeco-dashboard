const slug = new URLSearchParams(location.search).get('s') || location.pathname.split('/study/')[1]?.replace(/\/$/, '');
const study = STUDIES[slug];

if (!study) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center"><h1>Study not found</h1><a href="/">← Back</a></div>';
} else {
  document.getElementById('study-title').textContent = study.title;
  document.getElementById('study-meta').innerHTML = `
    <span>${study.target}</span>
    <span class="tag tag-${study.eval === 'GOOD' ? 'good' : 'bad'}">${study.eval}</span>
    <span class="tag tag-paper">${study.status}</span>`;
  document.getElementById('plain-summary').innerHTML = study.plain;
  document.getElementById('key-findings').innerHTML = study.findings;
  document.getElementById('tech-details').innerHTML = `<div class="tech">${study.tech}</div>`;
  document.title = `BioEco — ${study.title}`;

  // Manuscript PDF names (EN + JA)
  const MANUSCRIPT_PDFS = {
    'paper5-ghost-signals': { en: 'paper5-ghost-signals-manuscript.pdf', ja: 'paper5-ghost-signals-manuscript-ja.pdf' },
    'paper1-apparent-stability': { en: 'paper1-apparent-stability-manuscript.pdf', ja: 'paper1-apparent-stability-manuscript-ja.pdf' },
    'grl-note-mhw-sanriku': { en: 'grl-note-mhw-sanriku-manuscript.pdf', ja: 'grl-note-mhw-sanriku-manuscript-ja.pdf' },
    'sti-methods-note': { en: 'sti-methods-note-manuscript.pdf', ja: 'sti-methods-note-manuscript-ja.pdf' },
    'hmast1-phase1-cascade': null,
    'rdd-protected-areas': null
  };

  fetch('files/final-results.json').then(r => r.json()).then(data => {
    const files = data[study.dir] || [];
    const pdfInfo = MANUSCRIPT_PDFS[slug];
    const heroPdfEn = pdfInfo?.en ? files.find(f => f.path.endsWith(pdfInfo.en)) : null;
    const heroPdfJa = pdfInfo?.ja ? files.find(f => f.path.endsWith(pdfInfo.ja)) : null;

    const isInProgress = study.status?.includes('研究中') || study.status?.includes('保留') || study.eval === 'IN PROGRESS';

    if (!heroPdfEn && !heroPdfJa && isInProgress) {
      document.getElementById('manuscript-hero').style.display = 'block';
      document.getElementById('hero-title').textContent = '🔬 この研究はまだ進行中です';
      document.getElementById('hero-meta').textContent = study.status;
      document.getElementById('hero-link').outerHTML = `<div style="font-size:0.85rem;color:var(--dim);padding:8px 16px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid var(--border)">論文ドラフトは分析完了後に公開されます。下記の「主要な発見」で現在の進捗をご確認ください。</div>`;
    } else if (heroPdfEn || heroPdfJa) {
      document.getElementById('manuscript-hero').style.display = 'block';
      document.getElementById('hero-title').textContent = study.title;
      document.getElementById('hero-meta').textContent = 'BioEco Agent Lab | Draft Manuscript';
      const linkEl = document.getElementById('hero-link');
      let btns = '';
      if (heroPdfEn) {
        const sz = (heroPdfEn.size / 1024).toFixed(0);
        btns += `<a href="files/${study.dir}/${heroPdfEn.path}" target="_blank" style="background:var(--accent);color:#000;padding:10px 20px;border-radius:8px;font-weight:700;font-size:0.85rem;text-decoration:none;margin-right:8px">📄 English PDF (${sz}KB)</a>`;

    const heroPaths = [heroPdfEn?.path, heroPdfJa?.path].filter(Boolean);
    const docs = files.filter(f => !f.path.startsWith('review/') && !heroPaths.includes(f.path));

      ],
      'hmast1-phase1-cascade': [
        { title: 'SEM Phase 1-2（堅果予測）', author: 'Rin', file: '20260317-mast1-sem.md', desc: 'Ordinal logistic regression、AICモデル選択、LOOCV' },
      ],
      'rdd-protected-areas': [

      : '<p style="color:var(--dim)">実験ログは準備中です。各分析の手順書が完成次第、ここに公開されます。</p>';

      const icon = {md:'📄',pdf:'📊',csv:'📋',pptx:'📽️'}[ext] || '📁';

      return `<div class="file-item">
        <span class="icon">${icon}</span>
        <span class="name">${f.path}</span>
        <span class="size">${sizeFmt}</span>
        <a href="files/${study.dir}/${f.path}" target="_blank">DL</a>

      <div class="md-viewer" id="md-${f.path.replace(/[/.]/g,'_')}"></div>`;
    }).join('') || '<p style="color:var(--dim)">No files available</p>';

    document.getElementById('review-list').innerHTML = reviews.map(f => {
      const sizeFmt = (f.size/1024).toFixed(0)+'KB';
      return `<div class="file-item">
        <span class="icon">🔍</span>
        <span class="name">${f.path.replace('review/','')}</span>
        <span class="size">${sizeFmt}</span>
        <a href="files/${study.dir}/${f.path}" target="_blank">DL</a>
        <button class="toggle-btn" onclick="toggleMd(this,'${study.dir}/${f.path}')">View</button>
      </div>
      <div class="md-viewer" id="md-${f.path.replace(/[/.]/g,'_')}"></div>`;
    }).join('') || '<p style="color:var(--dim)">No reviews available</p>';
  });
}

function toggleMd(btn, path) {
  const id = 'md-' + path.split('/').pop().replace(/[/.]/g,'_');
  // find closest md-viewer after the button's parent
  const viewer = btn.parentElement.nextElementSibling;
  if (viewer.style.display === 'block') {
    viewer.style.display = 'none';
    btn.textContent = 'View';
  } else {
    fetch('files/' + path).then(r => r.text()).then(content => {
      viewer.textContent = content;
      viewer.style.display = 'block';
      btn.textContent = 'Hide';
    });
  }
}
</script>
